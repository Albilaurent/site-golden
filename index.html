<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amours de Goldinous</title>

<style>
html { scroll-behavior: smooth; }

body {
  font-family: 'Georgia', serif;
  margin: 0;
  background-color: #faf7f2;
  color: #3e2f1c;
}

/* HEADER */
header {
  position: relative;
  height: 300px;
  overflow: hidden;
}

header img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  color: white;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

/* MENU */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 20px;
  font-size: 28px;
  color: white;
  z-index: 2000;
  cursor: pointer;
}

.menu {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #b88a44;
  display: flex;
  flex-direction: column;
  padding-top: 60px;
  transition: 0.3s;
}

.menu a {
  color: white;
  padding: 15px;
  text-decoration: none;
  font-weight: bold;
}

.menu.active { right: 0; }

/* SECTIONS */
section {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  color: #b88a44;
  border-bottom: 2px solid #e5d3b3;
}

/* CARTES */
.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.card {
  width: 220px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  background: white;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* GALERIE */
.gallery img {
  width: 100%;
  max-width: 220px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
}

/* FORMULAIRE */
form {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #b88a44;
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}

.success-message {
  display: none;
  text-align: center;
  color: green;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: #3e2f1c;
  color: white;
  text-align: center;
  padding: 20px;
}

.paws {
  font-size: 22px;
  animation: walk 4s infinite linear;
}

@keyframes walk {
  0% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(-10px); }
}

/* BOUTONS FLOTTANTS */
.floating-buttons {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 3000;
}

.float-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.whatsapp { background: #25D366; }
.facebook { background: #1877F2; }

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <a href="#">Accueil</a>
  <a href="#chiens">Nos chiens</a>
  <a href="#galerie">Galerie</a>
  <a href="#contact">Contact</a>
</div>

<header>
  <img src="images/chiens (21).jpg">
  <div class="header-text">
    <h1>Amours de Goldinous</h1>
    <p>Élevage familial de Golden Retriever</p>
  </div>
</header>

<section id="chiens">
  <h2>Nos chiens</h2>
  <div class="cards">
    <div class="card">
      <img src="images/chiens (15).jpg">
      <h3>Jack</h3>
    </div>
    <div class="card">
      <img src="images/chiens (25).jpg">
      <h3>Kali</h3>
    </div>
  </div>
</section>

<section id="galerie">
  <h2>Galerie</h2>
  <div class="gallery">
    <img src="images/chiens (12).jpg">
    <img src="images/chiens (18).jpg">
    <img src="images/chiens (2).jpg">
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>

  <form id="contactForm" action="https://formsubmit.co/amoursdesgoldinous@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="#contact">

    <input type="text" name="Nom" placeholder="Votre nom" required>
    <input type="email" name="Email" placeholder="Votre email" required>
    <textarea name="Message" placeholder="Votre message" required></textarea>

    <button type="submit">Envoyer</button>
    <div class="success-message" id="successMsg">✅ Message envoyé avec succès !</div>
  </form>

</section>

<footer>
  <div class="paws">🐾 Amours de Goldinous 🐾</div>
  <p>Contact : amoursdesgoldinous@gmail.com</p>
</footer>

<!-- BOUTONS FLOTTANTS -->
<div class="floating-buttons">
  <a href="https://wa.me/32497642611?text=Bonjour%20je%20souhaite%20des%20informations%20sur%20vos%20chiots" target="_blank" class="float-btn whatsapp">💬</a>
  <a href="https://www.facebook.com/profile.php?id=61555150700118" target="_blank" class="float-btn facebook">f</a>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

document.getElementById("contactForm").addEventListener("submit", function(){
  document.getElementById("successMsg").style.display = "block";
});
</script>

</body>
</html>
