<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demande de réservation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  font-family: Georgia, serif;
  background: #faf7f2;
  margin: 0;
}

.container {
  display: flex;
  max-width: 1200px;
  margin: 40px auto;
  gap: 30px;
  padding: 20px;
}

.left {
  flex: 2;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.info-box {
  background: #fffaf0;
  border: 2px solid #e5d3b3;
  border-radius: 15px;
  padding: 20px;
}

.info-box h3 {
  margin-top: 0;
}

.info-line {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.highlight {
  background: #f3e4d0;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.step {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.step span {
  background: #8b5a2b;
  color: white;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.footer-form {
  margin-top: 40px;
  background: #f3e4d0;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  border-radius: 15px;
}

</style>

</head>

<body>

<div class="container">

<!-- GAUCHE -->
<div class="left">

<h1>🐾 Demande de réservation</h1>

<form action="https://formspree.io/f/xdayvwqn" method="POST">

<input type="text" placeholder="Nom" required>
<input type="email" placeholder="Email" required>

<button type="submit">Envoyer</button>

</form>

</div>

<!-- DROITE -->
<div class="right">

<div class="info-box">
<h3><i class="fa fa-heart"></i> Pourquoi ce formulaire ?</h3>
<p>Chaque demande est étudiée avec attention.</p>
</div>

<div class="info-box">

<div class="info-line">
<i class="fa fa-calendar"></i>
<div>Liste d’attente</div>
</div>

<div class="info-line">
<i class="fa fa-envelope"></i>
<div>Réponse par email</div>
</div>

<div class="highlight">
Nombre de chiots limité
</div>

</div>

<div class="info-box">
<h3>Notre processus</h3>

<div class="step"><span>1</span> Formulaire</div>
<div class="step"><span>2</span> Analyse</div>

</div>

</div>

</div>

</body>
</html>
